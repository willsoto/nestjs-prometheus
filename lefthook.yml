pre-commit:
  commands:
    format:
      glob: "*.{ts,js,json,md,yaml,yml}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,js}"
      run: pnpm exec oxlint {staged_files}
    markdown-toc:
      glob: "README.md"
      run: pnpm exec markdown-toc -i {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
